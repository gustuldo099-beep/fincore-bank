# Server
server.port=8083
spring.application.name=transaction-service

# Database
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/fincore_txn?sslmode=disable}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:fincore_admin}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:F1nC0re@dm1n#S3cur3!}
spring.datasource.driver-class-name=org.postgresql.Driver

# HikariCP
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.pool-name=FinCoreTxnPool

# JPA
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.open-in-view=false

# Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
spring.flyway.validate-on-migrate=true

# JWT
jwt.secret=${JWT_SECRET:8f4b2e9d1c7a3f6e0b5d8a2c4e7f1b3d6a9c2e5f8b1d4a7e0c3f6b9d2a5e8c1f}

# Kafka
spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer
spring.kafka.producer.properties.spring.json.add.type.headers=false
spring.kafka.consumer.group-id=transaction-service
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer
spring.kafka.consumer.properties.spring.json.trusted.packages=*

# Kafka Topics
kafka.topics.pix-initiated=pix-initiated
kafka.topics.pix-completed=pix-completed
kafka.topics.pix-failed=pix-failed

# Account Service URL (comunicação REST)
account.service.url=${ACCOUNT_SERVICE_URL:http://localhost:8082}

# Actuator
management.endpoints.web.exposure.include=health,info
server.error.include-stacktrace=never
server.error.include-message=never

spring.kafka.consumer.properties.spring.json.value.default.type=com.fincore.transaction.dto.PixEvent
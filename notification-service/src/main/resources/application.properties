# Server
server.port=8084
spring.application.name=notification-service

# Database
spring.datasource.url=jdbc:postgresql://localhost:5432/fincore_account?sslmode=disable
spring.datasource.username=fincore_admin
spring.datasource.password=fincore123
spring.datasource.driver-class-name=org.postgresql.Driver

# HikariCP
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.pool-name=FinCoreNotifPool

# JPA
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.open-in-view=false

# Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
spring.flyway.validate-on-migrate=true
spring.flyway.table=flyway_schema_history_notification

# Kafka
spring.kafka.bootstrap-servers=localhost:9092
spring.kafka.consumer.group-id=notification-service
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer
spring.kafka.consumer.properties.spring.json.trusted.packages=*
spring.kafka.consumer.properties.spring.json.value.default.type=com.fincore.notification.dto.NotificationEvent

kafka.topics.pix-completed=pix-completed
kafka.topics.pix-failed=pix-failed

# Actuator
management.endpoints.web.exposure.include=health,info
server.error.include-stacktrace=never
